<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog, Glow Era by Prudence Nteo</title>
<meta name="description" content="Weekly reflections on self-care, self-love, boundaries, and confidence from Prudence Nteo, author of Glow Era.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Playfair+Display:wght@500;600;700;800&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="grain-overlay"></div>

<header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <a href="/" class="logo">Glow&nbsp;Era</a>
    <nav class="main-nav">
      <a href="/#about-book">The Book</a>
      <a href="/#who">Who It's For</a>
      <a href="/#author">Author</a>
      <a href="/blog/">Blog</a>
      <a href="/#contact">Contact</a>
    </nav>
    <a href="https://www.amazon.com/dp/B0GZKK3TYL/" class="btn btn-small btn-outline" target="_blank" rel="noopener">Buy the Book</a>
  </div>
</header>

<main>
  <section class="blog-hero">
    <div class="container">
      <p class="eyebrow center">The Glow Era Journal</p>
      <h1>Reflections on Self-Care and Self-Love</h1>
      <p>Fresh notes from Prudence Nteo on healing, boundaries, confidence, and the daily practice of choosing yourself.</p>
    </div>
  </section>

  <section class="blog-list">
    <div class="container">
      <div class="blog-grid" id="blogGrid"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <span class="logo footer-logo">Glow&nbsp;Era</span>
    <p>&copy; <span id="year"></span> Glow Era by Prudence Nteo. All rights reserved.</p>
  </div>
</footer>

<script src="posts-data.js"></script>
<script>
  const grid = document.getElementById('blogGrid');
  const fmt = (iso) => {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  };
  grid.innerHTML = BLOG_POSTS.map(p => `
    <a class="blog-card" href="${p.slug}.html">
      <div class="blog-card-media"><span>Glow Era</span></div>
      <div class="blog-card-body">
        <div class="blog-card-meta"><span>${p.category}</span><span class="dot">&middot;</span><span>${fmt(p.date)}</span><span class="dot">&middot;</span><span>${p.readTime}</span></div>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <span class="blog-card-link">Read the Post</span>
      </div>
    </a>
  `).join('');
</script>
<script src="../script.js"></script>
</body>
</html>
